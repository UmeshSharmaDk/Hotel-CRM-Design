kind = "mobile"
previewPath = "/"
title = "Hotel CRM"
version = "1.0.0"
id = "artifacts/hotel-crm"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21948
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hotel-crm run dev"

[services.env]
PORT = "21948"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hotel-crm", "run", "build"]
run = ["pnpm", "--filter", "@workspace/hotel-crm", "run", "serve"]
